<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Código de Huffman — Visualizador</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #f8f7f4;
    --surface:  #ffffff;
    --border:   #e2e0d9;
    --border2:  #ccc9c0;
    --text:     #1a1a18;
    --muted:    #6b6860;
    --hint:     #9b9890;
    --blue-bg:  #e8f1fb;
    --blue:     #185FA5;
    --blue-t:   #0c447c;
    --green-bg: #e1f5ee;
    --green:    #0f6e56;
    --green-t:  #085041;
    --gray-bg:  #f1efe8;
    --gray:     #5f5e5a;
    --gray-t:   #444441;
    --amber:    #BA7517;
    --radius:   10px;
    --radius-sm:6px;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg:       #1c1c1a;
      --surface:  #252523;
      --border:   #363530;
      --border2:  #4a4844;
      --text:     #e8e6df;
      --muted:    #9b9890;
      --hint:     #6b6860;
      --blue-bg:  #0c2a45;
      --blue:     #5ba3e0;
      --blue-t:   #85b7eb;
      --green-bg: #04241c;
      --green:    #1d9e75;
      --green-t:  #5dcaa5;
      --gray-bg:  #2c2c2a;
      --gray:     #888780;
      --gray-t:   #b4b2a9;
      --amber:    #ef9f27;
    }
  }

  body {
    font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    font-size: 15px;
  }

  header {
    border-bottom: 0.5px solid var(--border);
    padding: 1.25rem 2rem;
    display: flex;
    align-items: baseline;
    gap: 1rem;
  }
  header h1 { font-size: 17px; font-weight: 600; letter-spacing: -.01em; }
  header p  { font-size: 13px; color: var(--muted); }

  main { max-width: 820px; margin: 0 auto; padding: 1.5rem 1.5rem 4rem; }

  .panel {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 1.25rem 1.5rem;
    margin-bottom: 1.25rem;
  }

  .section-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: .08em;
    text-transform: uppercase;
    color: var(--hint);
    margin-bottom: .9rem;
  }

  .row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-bottom: .8rem; }
  .row:last-child { margin-bottom: 0; }

  label.field { font-size: 13px; color: var(--muted); min-width: 140px; }

  input[type=range] {
    flex: 1; min-width: 80px;
    accent-color: var(--blue);
    cursor: pointer;
  }

  input[type=number] {
    width: 80px; font-size: 13px; padding: 5px 8px;
    border: 0.5px solid var(--border2); border-radius: var(--radius-sm);
    background: var(--bg); color: var(--text); text-align: center;
    appearance: textfield; -moz-appearance: textfield;
  }
  input[type=number]::-webkit-inner-spin-button { display: none; }
  input[type=number]:focus { outline: 2px solid var(--blue); outline-offset: 1px; border-color: transparent; }

  .btn {
    font-size: 13px; padding: 6px 16px;
    border: 0.5px solid var(--border2); border-radius: var(--radius-sm);
    background: transparent; color: var(--text);
    cursor: pointer; transition: background .12s;
  }
  .btn:hover { background: var(--bg); }
  .btn.primary {
    background: var(--text); color: var(--surface);
    border-color: transparent; font-weight: 500;
  }
  .btn.primary:hover { opacity: .85; }
  .btn:disabled { opacity: .4; cursor: default; }

  .prob-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(108px, 1fr));
    gap: 8px; margin-bottom: .8rem;
  }
  .prob-cell {
    display: flex; flex-direction: column; align-items: center; gap: 5px;
    background: var(--bg); border: 0.5px solid var(--border);
    border-radius: var(--radius-sm); padding: 10px 6px;
  }
  .prob-cell .sym { font-size: 20px; font-weight: 600; }

  .msg-err { font-size: 12px; color: #c0392b; margin-top: 4px; }
  .msg-ok  { font-size: 12px; color: #0f6e56; margin-top: 4px; }

  /* Step nav */
  .nav-row { display: flex; align-items: center; gap: 10px; margin-bottom: .9rem; }
  .step-counter { font-size: 13px; color: var(--muted); }
  .step-desc {
    font-size: 13px; color: var(--muted);
    min-height: 1.6em; margin-bottom: .8rem;
    padding: .5rem .75rem;
    background: var(--bg); border-radius: var(--radius-sm);
    border-left: 3px solid var(--border2);
  }

  /* Queue */
  .queue-row { display: flex; align-items: flex-end; gap: 8px; flex-wrap: wrap; }
  .qnode { display: flex; flex-direction: column; align-items: center; }
  .qbox {
    padding: 5px 14px; border-radius: var(--radius-sm);
    border: 0.5px solid var(--border2);
    background: var(--gray-bg); font-weight: 600; font-size: 13px;
    color: var(--gray-t); transition: background .2s, color .2s;
  }
  .qbox.hi {
    background: var(--blue-bg); border-color: var(--blue);
    color: var(--blue-t);
  }
  .qlabel { font-size: 11px; color: var(--hint); margin-top: 4px; }

  /* SVG tree */
  #tree-wrap { overflow-x: auto; margin-top: 1rem; }
  #tree-svg  { display: block; width: 100%; }

  /* Code table */
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { text-align: left; padding: 6px 10px; font-size: 11px; font-weight: 600; color: var(--hint); text-transform: uppercase; letter-spacing:.05em; border-bottom: 0.5px solid var(--border2); }
  td { padding: 7px 10px; border-bottom: 0.5px solid var(--border); }
  tr:last-child td { border-bottom: none; }
  .mono { font-family: 'Menlo', 'Consolas', monospace; letter-spacing: .04em; }
  .b0 { color: #1a5ca0; font-weight: 700; }
  .b1 { color: #9a6010; font-weight: 700; }
  @media (prefers-color-scheme: dark) {
    .b0 { color: #5ba3e0; }
    .b1 { color: #ef9f27; }
  }

  /* Metrics */
  .metrics-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; }
  .metric {
    background: var(--bg); border: 0.5px solid var(--border);
    border-radius: var(--radius-sm); padding: .85rem 1rem;
  }
  .metric .ml { font-size: 11px; color: var(--hint); margin-bottom: 5px; }
  .metric .mv { font-size: 21px; font-weight: 600; }
  .metric .mu { font-size: 12px; font-weight: 400; color: var(--muted); }

  #output { display: none; }
</style>
</head>
<body>

<header>
  <h1>Código de Huffman</h1>
  <p>Visualizador interativo passo a passo</p>
</header>

<main>

<!-- CONFIG -->
<div class="panel">
  <p class="section-label">Configuração</p>

  <div class="row">
    <label class="field" for="nsym">Número de símbolos</label>
    <input type="range" id="nsym" min="2" max="10" value="5" oninput="onNChange(this.value)">
    <span id="nsym-out" style="font-size:15px;font-weight:600;min-width:22px">5</span>
  </div>

  <div class="row" style="margin-top:.25rem">
    <label class="field">Probabilidades</label>
    <button class="btn" onclick="randomize()">Aleatório</button>
    <button class="btn" onclick="uniform()">Uniforme</button>
  </div>

  <div class="prob-grid" id="prob-grid"></div>
  <div id="prob-status"></div>

  <div class="row" style="margin-top:.75rem">
    <button class="btn primary" onclick="run()">▶ Construir árvore de Huffman</button>
  </div>
</div>

<!-- OUTPUT -->
<div id="output">

  <!-- STEP -->
  <div class="panel">
    <p class="section-label">Passo a passo — construção da árvore</p>
    <div class="nav-row">
      <button class="btn" id="btn-prev" onclick="goStep(-1)">← Anterior</button>
      <button class="btn" id="btn-next" onclick="goStep(1)">Próximo →</button>
      <span class="step-counter" id="step-label"></span>
    </div>
    <div class="step-desc" id="step-desc"></div>

    <p class="section-label" style="margin-bottom:.6rem">Fila de prioridade</p>
    <div class="queue-row" id="queue-display"></div>

    <div id="tree-wrap">
      <svg id="tree-svg" viewBox="0 0 760 300"></svg>
    </div>
  </div>

  <!-- TABLE -->
  <div class="panel">
    <p class="section-label">Tabela do código de Huffman</p>
    <table id="code-table"></table>
  </div>

  <!-- METRICS -->
  <div class="panel">
    <p class="section-label">Métricas de informação</p>
    <div class="metrics-grid" id="metrics"></div>
  </div>

</div><!-- /output -->
</main>

<script>
const LETTERS = 'ABCDEFGHIJ';
let N = 5, probs = [], steps = [], curStep = 0;
let finalCodes = {}, finalTree = null;

// ── Setup ──────────────────────────────────────────────────────────────────
function onNChange(v) {
  document.getElementById('nsym-out').textContent = v;
  N = +v;
  buildGrid();
  uniform();
}

function buildGrid() {
  const g = document.getElementById('prob-grid');
  g.innerHTML = '';
  for (let i = 0; i < N; i++) {
    const d = document.createElement('div');
    d.className = 'prob-cell';
    d.innerHTML = `<span class="sym">${LETTERS[i]}</span>
      <input type="number" id="p${i}" min="0" max="1" step="0.001" value="0" oninput="checkProbs()">`;
    g.appendChild(d);
  }
}

function setInputs(arr) {
  for (let i = 0; i < N; i++) {
    const el = document.getElementById('p' + i);
    if (el) el.value = arr[i].toFixed(4);
  }
  probs = [...arr];
  checkProbs();
}

function uniform() { setInputs(Array(N).fill(1 / N)); }

function randomize() {
  let r = Array.from({ length: N }, () => Math.random());
  const s = r.reduce((a, b) => a + b);
  setInputs(r.map(x => x / s));
}

function readProbs() {
  return Array.from({ length: N }, (_, i) => parseFloat(document.getElementById('p' + i)?.value) || 0);
}

function checkProbs() {
  probs = readProbs();
  const sum = probs.reduce((a, b) => a + b, 0);
  const el = document.getElementById('prob-status');
  if (probs.some(p => p < 0)) {
    el.innerHTML = '<p class="msg-err">⚠ Probabilidades devem ser não negativas.</p>';
    return false;
  }
  if (Math.abs(sum - 1) > 0.001) {
    el.innerHTML = `<p class="msg-err">⚠ Soma = ${sum.toFixed(4)} (deve ser 1.000)</p>`;
    return false;
  }
  el.innerHTML = '<p class="msg-ok">✓ Distribuição válida</p>';
  return true;
}

// ── Huffman ────────────────────────────────────────────────────────────────
function cloneNode(n) {
  if (!n) return null;
  return { id: n.id, prob: n.prob, symbols: [...n.symbols], left: cloneNode(n.left), right: cloneNode(n.right) };
}

function run() {
  probs = readProbs();
  if (!checkProbs()) return;

  steps = [];
  finalCodes = {};
  let uid = 0;

  let queue = LETTERS.slice(0, N).split('').map((s, i) => ({
    id: uid++, prob: probs[i], symbols: [s], left: null, right: null
  }));
  queue.sort((a, b) => a.prob - b.prob);

  steps.push({
    desc: 'Fila inicial com todos os símbolos, ordenados por probabilidade.',
    queue: queue.map(cloneNode),
    mergedIds: [],
    forests: queue.map(cloneNode)
  });

  while (queue.length > 1) {
    queue.sort((a, b) => a.prob - b.prob);
    const a = queue.shift();
    const b = queue.shift();
    const m = { id: uid++, prob: a.prob + b.prob, symbols: [...a.symbols, ...b.symbols], left: a, right: b };
    queue.push(m);
    queue.sort((a, b) => a.prob - b.prob);

    steps.push({
      desc: `Mesclar <strong>${fmtS(a)}</strong> (${f(a.prob)}) + <strong>${fmtS(b)}</strong> (${f(b.prob)}) → nó interno com prob ${f(m.prob)}`,
      queue: queue.map(cloneNode),
      mergedIds: [m.id],
      forests: queue.map(cloneNode)
    });
  }

  finalTree = queue[0];

  function assign(node, code) {
    if (!node.left && !node.right) { finalCodes[node.symbols[0]] = code || '0'; return; }
    if (node.left)  assign(node.left,  code + '0');
    if (node.right) assign(node.right, code + '1');
  }
  assign(finalTree, '');

  steps.push({
    desc: 'Árvore completa. Bits atribuídos: <strong style="color:#1a5ca0">0</strong> = ramo esquerdo &nbsp;|&nbsp; <strong style="color:#9a6010">1</strong> = ramo direito.',
    queue: [cloneNode(finalTree)],
    mergedIds: [],
    forests: [cloneNode(finalTree)],
    showCodes: true
  });

  curStep = 0;
  document.getElementById('output').style.display = 'block';
  renderStep();
  renderTable();
  renderMetrics();
}

function fmtS(n) { return n.symbols.length <= 4 ? n.symbols.join('') : n.symbols.slice(0, 3).join('') + '…'; }
function f(p)    { return p.toFixed(3); }

// ── Navigation ─────────────────────────────────────────────────────────────
function goStep(d) {
  const next = curStep + d;
  if (next < 0 || next >= steps.length) return;
  curStep = next;
  renderStep();
}

// ── Render step ────────────────────────────────────────────────────────────
function renderStep() {
  const s = steps[curStep];
  document.getElementById('step-label').textContent = `Passo ${curStep + 1} de ${steps.length}`;
  document.getElementById('step-desc').innerHTML = s.desc;
  document.getElementById('btn-prev').disabled = curStep === 0;
  document.getElementById('btn-next').disabled = curStep === steps.length - 1;

  // Queue
  let qhtml = '';
  for (const n of s.queue) {
    const hi = s.mergedIds.includes(n.id);
    qhtml += `<div class="qnode">
      <div class="qbox${hi ? ' hi' : ''}">${n.symbols.join('')}</div>
      <div class="qlabel">${f(n.prob)}</div>
    </div>`;
  }
  document.getElementById('queue-display').innerHTML = qhtml;

  drawForests(s.forests, s.mergedIds, s.showCodes || false);
}

// ── Tree layout & drawing ──────────────────────────────────────────────────
function treeDepth(n)     { if (!n || (!n.left && !n.right)) return 0; return 1 + Math.max(treeDepth(n.left), treeDepth(n.right)); }
function treeLeafCount(n) { if (!n) return 0; if (!n.left && !n.right) return 1; return treeLeafCount(n.left) + treeLeafCount(n.right); }

function layoutTree(node, xMin, xMax, depth, positions, vGap) {
  if (!node) return;
  positions[node.id] = { x: (xMin + xMax) / 2, y: 32 + depth * vGap };
  if (node.left)  layoutTree(node.left,  xMin,          (xMin + xMax) / 2, depth + 1, positions, vGap);
  if (node.right) layoutTree(node.right, (xMin + xMax) / 2, xMax,          depth + 1, positions, vGap);
}

function drawForests(forests, mergedIds, showCodes) {
  const svg = document.getElementById('tree-svg');
  if (!forests || forests.length === 0) { svg.innerHTML = ''; return; }

  const totalLeaves = forests.reduce((a, t) => a + Math.max(1, treeLeafCount(t)), 0);
  const maxDepth    = forests.reduce((a, t) => Math.max(a, treeDepth(t)), 0);
  const R = 18, vGap = 58;
  const svgW = 760;
  const svgH = Math.max(180, 32 + (maxDepth + 1) * vGap + R + 36);
  const slotW = (svgW - 20) / totalLeaves;

  // Detect dark mode for node fills
  const dark = window.matchMedia('(prefers-color-scheme: dark)').matches;
  const palette = {
    leaf:     { fill: dark ? '#04241c' : '#e1f5ee', stroke: dark ? '#1d9e75' : '#0f6e56', text: dark ? '#5dcaa5' : '#085041' },
    internal: { fill: dark ? '#0c1e30' : '#e8f1fb', stroke: dark ? '#5ba3e0' : '#185FA5', text: dark ? '#85b7eb' : '#0c447c' },
    merged:   { fill: dark ? '#0c2a45' : '#dbeeff', stroke: dark ? '#5ba3e0' : '#185FA5', text: dark ? '#85b7eb' : '#0c447c' },
  };
  const edgeColor = dark ? '#4a4844' : '#ccc9c0';
  const probColor = dark ? '#6b6860' : '#9b9890';
  const b0color   = dark ? '#5ba3e0' : '#1a5ca0';
  const b1color   = dark ? '#ef9f27' : '#9a6010';

  let edges = '', nodes = '', labels = '';
  let xCursor = 10;

  for (const tree of forests) {
    const leaves = Math.max(1, treeLeafCount(tree));
    const treeW  = leaves * slotW;
    const xMin   = xCursor, xMax = xCursor + treeW;
    xCursor += treeW;

    const positions = {};
    layoutTree(tree, xMin, xMax, 0, positions, vGap);

    const isMerged = mergedIds.includes(tree.id);

    function drawEdges(n) {
      if (!n) return;
      const p = positions[n.id];
      if (!p) return;
      [['left', '0', b0color, -9], ['right', '1', b1color, 9]].forEach(([side, bit, color, mx]) => {
        if (!n[side]) return;
        const cp = positions[n[side].id];
        if (!cp) return;
        edges += `<line x1="${p.x}" y1="${p.y}" x2="${cp.x}" y2="${cp.y}" stroke="${edgeColor}" stroke-width="1.5"/>`;
        if (showCodes) {
          const lx = (p.x + cp.x) / 2 + mx, ly = (p.y + cp.y) / 2 + 2;
          edges += `<text x="${lx}" y="${ly}" text-anchor="middle" font-size="12" font-family="monospace" fill="${color}" font-weight="700">${bit}</text>`;
        }
        drawEdges(n[side]);
      });
    }

    function drawNodes(n) {
      if (!n) return;
      const p = positions[n.id];
      if (!p) return;
      const isLeaf = !n.left && !n.right;
      const pal = isMerged && !isLeaf ? palette.merged : (isLeaf ? palette.leaf : palette.internal);

      nodes += `<circle cx="${p.x}" cy="${p.y}" r="${R}" fill="${pal.fill}" stroke="${pal.stroke}" stroke-width="1.2"/>`;
      if (isLeaf) {
        nodes += `<text x="${p.x}" y="${p.y}" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="600" fill="${pal.text}">${n.symbols[0]}</text>`;
      }
      labels += `<text x="${p.x}" y="${p.y + R + 13}" text-anchor="middle" font-size="10" fill="${probColor}">${f(n.prob)}</text>`;

      if (showCodes && isLeaf && finalCodes[n.symbols[0]]) {
        const code = finalCodes[n.symbols[0]];
        const charW = 7.5, totalW = code.length * charW;
        let cx = p.x - totalW / 2 + charW / 2;
        let codeEl = '';
        for (const b of code) {
          codeEl += `<text x="${cx}" y="${p.y - R - 6}" text-anchor="middle" font-size="11" font-family="monospace" fill="${b === '0' ? b0color : b1color}" font-weight="700">${b}</text>`;
          cx += charW;
        }
        labels += codeEl;
      }

      if (n.left)  drawNodes(n.left);
      if (n.right) drawNodes(n.right);
    }

    drawEdges(tree);
    drawNodes(tree);
  }

  svg.setAttribute('viewBox', `0 0 ${svgW} ${svgH}`);
  svg.innerHTML = edges + nodes + labels;
}

// ── Table ──────────────────────────────────────────────────────────────────
function renderTable() {
  let html = '<thead><tr><th>Símbolo</th><th>Probabilidade</th><th>Código</th><th>Comprimento</th></tr></thead><tbody>';
  LETTERS.slice(0, N).split('').forEach((s, i) => {
    const code = finalCodes[s] || '';
    const bits = code.split('').map(b => `<span class="b${b}">${b}</span>`).join('');
    html += `<tr><td><strong>${s}</strong></td><td>${probs[i].toFixed(4)}</td><td class="mono">${bits}</td><td>${code.length}</td></tr>`;
  });
  document.getElementById('code-table').innerHTML = html + '</tbody>';
}

// ── Metrics ────────────────────────────────────────────────────────────────
function renderMetrics() {
  const syms = LETTERS.slice(0, N).split('');
  const L = syms.reduce((acc, s, i) => acc + probs[i] * (finalCodes[s] || '').length, 0);
  const H = syms.reduce((acc, s, i) => { const p = probs[i]; return acc - (p > 0 ? p * Math.log2(p) : 0); }, 0);
  const eff = H / L;
  document.getElementById('metrics').innerHTML = `
    <div class="metric"><div class="ml">Comprimento esperado L̄</div><div class="mv">${L.toFixed(4)} <span class="mu">bits/símbolo</span></div></div>
    <div class="metric"><div class="ml">Entropia H(X)</div><div class="mv">${H.toFixed(4)} <span class="mu">bits/símbolo</span></div></div>
    <div class="metric"><div class="ml">Eficiência η = H / L̄</div><div class="mv">${(eff * 100).toFixed(2)}<span class="mu">%</span></div></div>
    <div class="metric"><div class="ml">Redundância 1 − η</div><div class="mv">${((1 - eff) * 100).toFixed(2)}<span class="mu">%</span></div></div>`;
}

// ── Init ───────────────────────────────────────────────────────────────────
buildGrid();
uniform();
</script>
</body>
</html>
